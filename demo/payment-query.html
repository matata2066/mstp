<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>MSTP - 支付指令查询</title>
  <link rel="stylesheet" href="common.css">
  <style>
    .status-flow {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 0;
      margin-top: 8px;
    }
    .status-node {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 3px 10px;
      font-size: 12px;
      border-radius: 4px;
      white-space: nowrap;
      color: #bbb;
      background: #f5f5f5;
      border: 1px solid #e8e8e8;
      transition: all 0.2s;
    }
    .status-node.reached {
      color: var(--text-secondary);
      background: #e6f4ff;
      border-color: #91caff;
    }
    .status-node.current {
      color: #fff;
      font-weight: 600;
      border-color: transparent;
    }
    .status-node.current.cls-green { background: var(--success); }
    .status-node.current.cls-blue { background: var(--primary); }
    .status-node.current.cls-red { background: var(--error); }
    .status-node.current.cls-orange { background: var(--warning); }
    .status-node.current.cls-gray { background: #8c8c8c; }
    .status-arrow {
      display: inline-flex;
      align-items: center;
      color: #d9d9d9;
      font-size: 10px;
      margin: 0 2px;
    }
    .status-arrow.reached { color: var(--primary); }
  </style>
</head>
<body>

  <div class="main">

      </div>

      <div class="card">

            <thead>

            </thead>
            <tbody id="tableBody"></tbody>

        </div>
        <div class="pagination">
          <span>共 8 条</span>

          </div>

    </div>

</div>

<div id="detailModal" class="modal-overlay">

<script src="common.js"></script>

const statusMap = {
  'RECEIVED': { label:'已接收', cls:'gray' },
  'ENRICHING': { label:'要素补齐中', cls:'gray' },
  'ENRICHED': { label:'要素已补齐', cls:'gray' },
  'SENDING': { label:'发送中', cls:'blue' },
  'SENT': { label:'已发送', cls:'blue' },
  'POLLING': { label:'状态轮询中', cls:'blue' },
  'PAYMENT_SUCCESS': { label:'支付成功', cls:'green' },
  'PAYMENT_FAILED': { label:'支付失败', cls:'red' },
  'COMPLETED': { label:'已完成', cls:'green' },
  'SEND_FAILED': { label:'发送失败', cls:'red' },
  'STATUS_UNKNOWN': { label:'状态未知', cls:'orange' },
  'CONFIRM_MISMATCH': { label:'动账不一致', cls:'orange' },
};

const statusSequence = [
  'RECEIVED','ENRICHING','ENRICHED','SENDING','SENT','POLLING','PAYMENT_SUCCESS','COMPLETED'
];

const statusBranches = {
  'SEND_FAILED': { from: 'SENDING', label: '发送失败' },
  'PAYMENT_FAILED': { from: 'POLLING', label: '支付失败' },
  'STATUS_UNKNOWN': { from: 'POLLING', label: '状态未知' },
  'CONFIRM_MISMATCH': { from: 'PAYMENT_SUCCESS', label: '动账不一致' },
};

function buildStatusFlow(currentStatus) {
  const s = statusMap[currentStatus] || { label: currentStatus, cls:'gray' };
  const isBranch = !!statusBranches[currentStatus];

  let reachedSet = new Set();
  if (!isBranch) {
    const idx = statusSequence.indexOf(currentStatus);
    for (let i = 0; i <= idx; i++) reachedSet.add(statusSequence[i]);
  } else {
    const branch = statusBranches[currentStatus];
    const idx = statusSequence.indexOf(branch.from);
    for (let i = 0; i <= idx; i++) reachedSet.add(statusSequence[i]);
    reachedSet.add(currentStatus);
  }

  let html = '<div class="status-flow">';
  statusSequence.forEach((st, i) => {
    const isCurrent = st === currentStatus;
    const isReached = reachedSet.has(st);
    const stInfo = statusMap[st];

    if (i > 0) {
      const arrowReached = reachedSet.has(statusSequence[i - 1]) && (isReached || isCurrent);
      html += `<span class="status-arrow${arrowReached ? ' reached' : ''}">▸</span>`;
    }

    if (isCurrent) {
      html += `<span class="status-node current cls-${stInfo.cls}">${stInfo.label}</span>`;
    } else if (isReached) {
      html += `<span class="status-node reached">${stInfo.label}</span>`;
    } else {
      html += `<span class="status-node">${stInfo.label}</span>`;
    }

    if (isBranch && statusBranches[currentStatus].from === st) {
      html += `<span class="status-arrow reached">▸</span>`;
      const curInfo = statusMap[currentStatus];
      html += `<span class="status-node current cls-${curInfo.cls}">${curInfo.label}</span>`;
    }
  });
  html += '</div>';
  return html;
}

const tbody = document.getElementById('tableBody');
data.forEach(r => {
  const s = statusMap[r.status] || { label: r.status, cls:'gray' };
  const channelTag = r.channel === 'CNAPS' ? '<span class="tag tag-blue">CNAPS</span>' : '<span class="tag tag-purple">CIPS</span>';
  tbody.innerHTML += `<tr ondblclick="showDetail('${r.id}')">
    <td style="font-family:monospace;font-size:12px">${r.id}</td>
    <td>${channelTag}</td>
    <td>${r.payerBank}</td>
    <td>${maskAccount(r.payerAccount)}</td>
    <td>${r.payerName}</td>
    <td>${r.payeeBank}</td>
    <td>${maskAccount(r.payeeAccount)}</td>
    <td>${maskName(r.payeeName)}</td>
    <td>${formatAmount(r.amount)}</td>
    <td><span class="tag tag-${s.cls}">${s.label}</span></td>
  </tr>`;
});

function showDetail(id) {
  const r = data.find(d => d.id === id);
  if (!r) return;
  const s = statusMap[r.status] || { label: r.status, cls:'gray' };
  const channelTag = r.channel === 'CNAPS' ? '<span class="tag tag-blue">CNAPS</span>' : '<span class="tag tag-purple">CIPS</span>';

  let timelineHtml = r.timeline.map(t => {
    const dotCls = t.to.includes('FAILED') ? 'error' : t.to === 'COMPLETED' || t.to === 'PAYMENT_SUCCESS' ? 'success' : '';
    return `<div class="timeline-item">
      <div class="timeline-dot ${dotCls}"></div>
      <div class="timeline-content">
        <div class="timeline-time">${t.time}</div>
        <div class="timeline-text">${statusMap[t.from]?.label || t.from} → ${statusMap[t.to]?.label || t.to}</div>
      </div>
    </div>`;
  }).join('');

  document.getElementById('detailBody').innerHTML = `
    <div class="detail-section-title">基本信息</div>
    <div class="detail-grid">
      <div class="detail-label">交易ID</div><div class="detail-value" style="font-family:monospace">${r.id}</div>

</html>
