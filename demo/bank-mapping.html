<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>MSTP - 行号映射</title>
  <link rel="stylesheet" href="common.css">
</head>
<body>
<div class="layout">
  <div id="sidebar" class="sidebar"></div>
  <div class="main">
    <div id="header" class="header"></div>
    <div class="content">
      <div class="page-header">
        <div class="page-title">行号映射</div>
        <button class="btn btn-primary" onclick="openModal('addModal')">+ 新增</button>
      </div>

      <div class="search-bar">
        <div class="form-item">
          <span class="form-label">行号</span>
          <input class="form-input" placeholder="请输入行号">
        </div>
        <div class="form-item">
          <span class="form-label">类型</span>
          <select class="form-select"><option>全部</option><option>CNAPS</option><option>CIPS</option></select>
        </div>
        <div class="form-item">
          <span class="form-label">状态</span>
          <select class="form-select"><option>全部</option><option>有效</option><option>停用</option></select>
        </div>
        <button class="btn btn-primary">查询</button>
        <button class="btn">重置</button>
      </div>

      <div class="card">
        <div class="table-wrapper">
          <table>
            <thead>
              <tr><th>序号</th><th>行号</th><th>行名</th><th>类型</th><th>状态</th><th>操作</th></tr>
            </thead>
            <tbody id="tableBody"></tbody>
          </table>
        </div>
        <div class="pagination">
          <span>共 8 条</span>
          <div class="pagination-pages"><div class="page-btn active">1</div></div>
        </div>
      </div>
    </div>
  </div>
</div>

<div id="detailModal" class="modal-overlay">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">行号映射详情</div>
      <button class="modal-close" onclick="closeModal('detailModal')">✕</button>
    </div>
    <div class="modal-body" id="detailBody"></div>
    <div class="modal-footer"><button class="btn" onclick="closeModal('detailModal')">关闭</button></div>
  </div>
</div>

<div id="addModal" class="modal-overlay">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">新增行号映射</div>
      <button class="modal-close" onclick="closeModal('addModal')">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-grid">
        <div class="form-label required">行号</div>
        <input class="form-input" placeholder="CNAPS 12位数字 / CIPS BIC 11位">
        <div class="form-label required">行名</div>
        <input class="form-input" placeholder="请输入行名">
        <div class="form-label required">类型</div>
        <select class="form-select"><option value="">请选择</option><option>CNAPS</option><option>CIPS</option></select>
        <div class="form-label">备注</div>
        <input class="form-input" placeholder="请输入备注">
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="closeModal('addModal')">取消</button>
      <button class="btn btn-primary" onclick="closeModal('addModal')">提交审批</button>
    </div>
  </div>
</div>

<script src="common.js"></script>
<script>
initSidebar('bank-mapping');
initHeader([{text:'映射管理',href:'#'},{text:'行号映射'}]);

const data = [
  { id:1, bankCode:'102100099996', bankName:'中国工商银行北京市分行', codeType:'CNAPS', status:'有效', maker:'user001', makerTime:'2026-05-18 10:00:00', checker:'user002', checkerTime:'2026-05-18 10:05:00' },
  { id:2, bankCode:'105100000017', bankName:'中国建设银行北京市分行', codeType:'CNAPS', status:'有效', maker:'user001', makerTime:'2026-05-17 14:20:00', checker:'user003', checkerTime:'2026-05-17 14:30:00' },
  { id:3, bankCode:'103100000026', bankName:'中国农业银行北京市分行', codeType:'CNAPS', status:'有效', maker:'user002', makerTime:'2026-05-16 09:00:00', checker:'user001', checkerTime:'2026-05-16 09:10:00' },
  { id:4, bankCode:'104100000004', bankName:'中国银行北京市分行', codeType:'CNAPS', status:'有效', maker:'user003', makerTime:'2026-05-15 16:00:00', checker:'user002', checkerTime:'2026-05-15 16:10:00' },
  { id:5, bankCode:'CIBKCNBJXXX', bankName:'兴业银行股份有限公司', codeType:'CIPS', status:'有效', maker:'user001', makerTime:'2026-05-14 11:30:00', checker:'user003', checkerTime:'2026-05-14 11:40:00' },
  { id:6, bankCode:'CMBCCNBSXXX', bankName:'招商银行股份有限公司', codeType:'CIPS', status:'有效', maker:'user002', makerTime:'2026-05-13 15:00:00', checker:'user001', checkerTime:'2026-05-13 15:15:00' },
  { id:7, bankCode:'SPDBCNBJXXX', bankName:'上海浦东发展银行股份有限公司', codeType:'CIPS', status:'停用', maker:'user003', makerTime:'2026-05-12 10:00:00', checker:'user002', checkerTime:'2026-05-12 10:10:00' },
  { id:8, bankCode:'301290000011', bankName:'交通银行北京市分行', codeType:'CNAPS', status:'有效', maker:'user001', makerTime:'2026-05-11 13:00:00', checker:'user003', checkerTime:'2026-05-11 13:10:00' },
];

const tbody = document.getElementById('tableBody');
data.forEach(r => {
  const statusTag = r.status === '有效' ? '<span class="tag tag-green">有效</span>' : '<span class="tag tag-red">停用</span>';
  const typeTag = r.codeType === 'CNAPS' ? '<span class="tag tag-blue">CNAPS</span>' : '<span class="tag tag-purple">CIPS</span>';
  tbody.innerHTML += `<tr ondblclick="showDetail(${r.id})">
    <td>${r.id}</td>
    <td style="font-family:monospace">${r.bankCode}</td>
    <td>${r.bankName}</td>
    <td>${typeTag}</td>
    <td>${statusTag}</td>
    <td>
      <button class="btn-link btn-sm" onclick="event.stopPropagation();showDetail(${r.id})">详情</button>
      <button class="btn-link btn-sm" onclick="event.stopPropagation();openModal('addModal')">编辑</button>
    </td>
  </tr>`;
});

function showDetail(id) {
  const r = data.find(d => d.id === id);
  if (!r) return;
  document.getElementById('detailBody').innerHTML = `
    <div class="detail-grid">
      <div class="detail-label">行号</div><div class="detail-value" style="font-family:monospace">${r.bankCode}</div>
      <div class="detail-label">行名</div><div class="detail-value">${r.bankName}</div>
      <div class="detail-label">类型</div><div class="detail-value">${r.codeType}</div>
      <div class="detail-label">状态</div><div class="detail-value">${r.status}</div>
    </div>
    <div class="detail-section">
      <div class="detail-section-title">审批信息</div>
      <div class="detail-grid">
        <div class="detail-label">制单人</div><div class="detail-value">${r.maker}</div>
        <div class="detail-label">制单时间</div><div class="detail-value">${r.makerTime}</div>
        <div class="detail-label">审批人</div><div class="detail-value">${r.checker}</div>
        <div class="detail-label">审批时间</div><div class="detail-value">${r.checkerTime}</div>
      </div>
    </div>`;
  openModal('detailModal');
}
</script>
</body>
</html>
