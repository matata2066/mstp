<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>MSTP - 维护记录查询</title>
  <link rel="stylesheet" href="common.css">
</head>
<body>
<div class="layout">
  <div id="sidebar" class="sidebar"></div>
  <div class="main">
    <div id="header" class="header"></div>
    <div class="content">
      <div class="page-header">
        <div class="page-title">维护记录查询</div>
      </div>

      <div class="search-bar">
        <div class="form-item">
          <span class="form-label">业务类型</span>
          <select class="form-select"><option>全部</option><option>账号映射</option><option>行号映射</option><option>附言映射</option><option></option>付款配置</option></select>
        </div>
        <div class="form-item">
          <span class="form-label">审批状态</span>
          <select class="form-select"><option>全部</option><option>待审批</option><option>通过</option><option>拒绝</option></select>
        </div>
        <div class="form-item">
          <span class="form-label">制单人</span>
          <input class="form-input" placeholder="请输入制单人">
        </div>
        <button class="btn btn-primary">查询</button>
        <button class="btn">重置</button>
      </div>

      <div class="card">
        <div class="table-wrapper">
          <table>
            <thead>
              <tr><th>序号</th><th>审批单号</th><th>业务类型</th><th>操作类型</th><th>制单人</th><th>审批状态</th><th>审批人</th><th>审批时间</th><th>操作</th></tr>
            </thead>
            <tbody id="tableBody"></tbody>
          </table>
        </div>
        <div class="pagination">
          <span>共 11 条</span>
          <div class="pagination-pages">
            <div class="page-btn active">1</div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<div id="detailModal" class="modal-overlay">
  <div class="modal" style="width:660px">
    <div class="modal-header">
      <div class="modal-title">维护记录详情</div>
      <button class="modal-close" onclick="closeModal('detailModal')">✕</button>
    </div>
    <div class="modal-body" id="detailBody"></div>
    <div class="modal-footer"><button class="btn" onclick="closeModal('detailModal')">关闭</button></div>
  </div>
</div>

<script src="common.js"></script>
<script>
initSidebar('maintenance-log');
initHeader([{text:'交易查询',href:'#'},{text:'维护记录'}]);

const data = [
  { id:1, approvalId:'APR-20260518-001', bizType:'账号映射', opType:'新增', maker:'user001', approvalStatus:'待审批', checker:'', checkerTime:'', detail:'新增收款账号 6225880999900001，户名：陈九，币种：CNY' },
  { id:2, approvalId:'APR-20260518-002', bizType:'行号映射', opType:'修改', maker:'user001', approvalStatus:'待审批', checker:'', checkerTime:'', detail:'修改行号 102100099996 行名：中国工商银行北京分行 → 中国工商银行北京市分行' },
  { id:3, approvalId:'APR-20260518-003', bizType:'付款配置', opType:'新增', maker:'user002', approvalStatus:'待审批', checker:'', checkerTime:'', detail:'新增 CIPS 渠道 EUR 币种付款配置' },
  { id:4, approvalId:'APR-20260517-001', bizType:'账号映射', opType:'新增', maker:'user001', approvalStatus:'通过', checker:'user003', checkerTime:'2026-05-17 10:15:00', detail:'新增收款账号 6225880123456789，户名：张三，币种：CNY' },
  { id:5, approvalId:'APR-20260517-002', bizType:'行号映射', opType:'修改', maker:'user001', approvalStatus:'拒绝', checker:'user003', checkerTime:'2026-05-17 10:20:00', detail:'修改行号 102100099996 行名，拒绝原因：行名格式不规范', rejectReason:'行名格式不规范，请使用全称' },
  { id:6, approvalId:'APR-20260516-001', bizType:'付款配置', opType:'新增', maker:'user002', approvalStatus:'通过', checker:'user001', checkerTime:'2026-05-16 09:30:00', detail:'新增 CNAPS 渠道 CNY 币种付款配置' },
  { id:7, approvalId:'APR-20260515-001', bizType:'账号映射', opType:'停用', maker:'user002', approvalStatus:'通过', checker:'user003', checkerTime:'2026-05-15 14:00:00', detail:'停用收款账号 6221880123450123' },
  { id:8, approvalId:'APR-20260514-001', bizType:'行号映射', opType:'新增', maker:'user003', approvalStatus:'通过', checker:'user002', checkerTime:'2026-05-14 11:40:00', detail:'新增 CIPS 行号 CIBKCNBJXXX，行名：兴业银行股份有限公司' },
  { id:9, approvalId:'APR-20260513-001', bizType:'付款配置', opType:'修改', maker:'user001', approvalStatus:'拒绝', checker:'user002', checkerTime:'2026-05-13 15:30:00', detail:'修改 CIPS 渠道 USD 币种付款配置，拒绝原因：付款账号信息有误', rejectReason:'付款账号信息有误，请核实后重新提交' },
  { id:10, approvalId:'APR-20260512-001', bizType:'附言映射', opType:'新增', maker:'user001', approvalStatus:'通过', checker:'user003', checkerTime:'2026-05-12 11:00:00', detail:'新增附言映射 SALARY → 工资' },
  { id:11, approvalId:'APR-20260511-001', bizType:'附言映射', opType:'修改', maker:'user002', approvalStatus:'待审批', checker:'', checkerTime:'', detail:'修改附言映射 LOAN% 中文附言：贷款 → 贷款发放' },
];

const tbody = document.getElementById('tableBody');
data.forEach(r => {
  let statusTag;
  if (r.approvalStatus === '待审批') statusTag = '<span class="tag tag-orange">待审批</span>';
  else if (r.approvalStatus === '通过') statusTag = '<span class="tag tag-green">通过</span>';
  else statusTag = '<span class="tag tag-red">拒绝</span>';

  const opTag = r.opType === '新增' ? 'tag-green' : r.opType === '修改' ? 'tag-blue' : 'tag-red';

  tbody.innerHTML += `<tr ondblclick="showDetail(${r.id})">
    <td>${r.id}</td>
    <td style="font-family:monospace">${r.approvalId}</td>
    <td>${r.bizType}</td>
    <td><span class="tag ${opTag}">${r.opType}</span></td>
    <td>${r.maker}</td>
    <td>${statusTag}</td>
    <td>${r.checker || '-'}</td>
    <td>${r.checkerTime || '-'}</td>
    <td><button class="btn-link btn-sm" onclick="event.stopPropagation();showDetail(${r.id})">详情</button></td>
  </tr>`;
});

function showDetail(id) {
  const r = data.find(d => d.id === id);
  if (!r) return;
  const statusColor = r.approvalStatus === '通过' ? 'var(--success)' : r.approvalStatus === '拒绝' ? 'var(--error)' : 'var(--warning)';
  document.getElementById('detailBody').innerHTML = `
    <div class="detail-grid">
      <div class="detail-label">审批单号</div><div class="detail-value" style="font-family:monospace">${r.approvalId}</div>
      <div class="detail-label">业务类型</div><div class="detail-value">${r.bizType}</div>
      <div class="detail-label">操作类型</div><div class="detail-value">${r.opType}</div>
      <div class="detail-label">制单人</div><div class="detail-value">${r.maker}</div>
      <div class="detail-label">审批状态</div><div class="detail-value" style="color:${statusColor};font-weight:600">${r.approvalStatus}</div>
      <div class="detail-label">审批人</div><div class="detail-value">${r.checker || '-'}</div>
      <div class="detail-label">审批时间</div><div class="detail-value">${r.checkerTime || '-'}</div>
    </div>
    <div class="detail-section">
      <div class="detail-section-title">变更内容</div>
      <div style="font-size:14px;color:var(--text);line-height:1.8">${r.detail}</div>
    </div>
    ${r.rejectReason ? `
    <div class="detail-section">
      <div class="detail-section-title">拒绝原因</div>
      <div style="font-size:14px;color:var(--error);line-height:1.8">${r.rejectReason}</div>
    </div>` : ''}`;
  openModal('detailModal');
}
</script>
</body>
</html>
