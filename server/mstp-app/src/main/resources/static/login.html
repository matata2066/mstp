<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>MSTP 登录</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#f0f2f5;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;display:flex;justify-content:center;align-items:center;min-height:100vh}
.login-card{background:#fff;border-radius:8px;box-shadow:0 2px 8px rgba(0,0,0,.1);padding:40px;width:360px}
.login-card h2{text-align:center;color:#1a1a1a;margin-bottom:8px;font-size:24px}
.login-card p{text-align:center;color:#888;margin-bottom:32px;font-size:14px}
.form-item{margin-bottom:20px}
.form-item label{display:block;font-size:14px;color:#333;margin-bottom:6px;font-weight:500}
.form-item input{width:100%;height:40px;padding:0 12px;border:1px solid #d9d9d9;border-radius:6px;font-size:14px;outline:none;transition:border-color .3s}
.form-item input:focus{border-color:#1890ff;box-shadow:0 0 0 2px rgba(24,144,255,.2)}
.btn-login{width:100%;height:40px;background:#1890ff;color:#fff;border:none;border-radius:6px;font-size:16px;cursor:pointer;transition:background .3s}
.btn-login:hover{background:#40a9ff}
.hint{text-align:center;margin-top:16px;font-size:12px;color:#999}
.hint span{color:#1890ff;cursor:pointer}
</style>
</head>
<body>
<div class="login-card">
  <h2>MSTP</h2>
  <p>多渠道支付中间平台</p>
  <form action="/login" method="post">
    <div class="form-item">
      <label>用户名</label>
      <input type="text" name="username" placeholder="输入用户名登录" autofocus>
    </div>
    <input type="hidden" name="password" value="dev">
    <button type="submit" class="btn-login">登 录</button>
  </form>
  <div class="hint">可用用户名：<span onclick="document.querySelector('[name=username]').value='admin'">admin</span> · <span onclick="document.querySelector('[name=username]').value='maker'">maker</span> · <span onclick="document.querySelector('[name=username]').value='checker'">checker</span> · <span onclick="document.querySelector('[name=username]').value='viewer'">viewer</span></div>
</div>
</body>
</html>
