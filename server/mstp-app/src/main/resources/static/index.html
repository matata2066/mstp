<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>MSTP - 多渠道支付中间平台</title>
<link rel="stylesheet" href="common.css">
<style>
.stat-cards{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px}
.stat-card{background:var(--bg-container);border-radius:var(--radius);box-shadow:var(--shadow);padding:20px 24px;display:flex;align-items:center;gap:16px}
.stat-icon{width:48px;height:48px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:22px}
.stat-icon.blue{background:#e6f4ff;color:var(--primary)}
.stat-icon.green{background:#f6ffed;color:var(--success)}
.stat-icon.orange{background:#fff7e6;color:var(--warning)}
.stat-icon.purple{background:#f9f0ff;color:#722ed1}
.stat-info{flex:1}
.stat-label{font-size:14px;color:var(--text-secondary);margin-bottom:4px}
.stat-value{font-size:28px;font-weight:700;color:var(--text);line-height:1.2}
.stat-unit{font-size:14px;font-weight:400;color:var(--text-secondary);margin-left:4px}
.links{background:var(--bg-container);border-radius:var(--radius);box-shadow:var(--shadow);padding:20px}
.links h3{font-size:15px;font-weight:600;margin-bottom:12px;color:var(--text)}
.links ul{list-style:none}
.links li{padding:8px 0;border-bottom:1px solid #f5f5f5}
.links li:last-child{border-bottom:none}
.links a{color:var(--primary);text-decoration:none;font-size:14px}
.links a:hover{color:#4096ff}
.links .desc{color:var(--text-tertiary);font-size:12px;margin-left:8px}
</style>
</head>
<body>
<div class="layout">
  <div id="sidebar" class="sidebar"></div>
  <div class="main">
    <div id="header" class="header"></div>
    <div class="content">
      <div class="stat-cards">
        <div class="stat-card">
          <div class="stat-icon blue">💳</div>
          <div class="stat-info">
            <div class="stat-label">支付指令</div>
            <div class="stat-value" id="paymentCount">-<span class="stat-unit">笔</span></div>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon orange">📋</div>
          <div class="stat-info">
            <div class="stat-label">待审批</div>
            <div class="stat-value" id="pendingApproval">-<span class="stat-unit">条</span></div>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon green">⚠️</div>
          <div class="stat-info">
            <div class="stat-label">异常消息</div>
            <div class="stat-value" id="exceptionCount">-<span class="stat-unit">条</span></div>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon purple">✅</div>
          <div class="stat-info">
            <div class="stat-label">系统状态</div>
            <div class="stat-value" style="color:var(--success);font-size:22px">正常运行</div>
          </div>
        </div>
      </div>
      <div class="links">
        <h3>快速入口</h3>
        <ul>
          <li><a href="/h2-console" target="_blank">H2 数据库控制台</a><span class="desc">查看内存数据库</span></li>
          <li><a href="/actuator/health" target="_blank">健康检查</a><span class="desc">Actuator /health</span></li>
          <li><a href="/swagger-ui.html" target="_blank">API 文档</a><span class="desc">Swagger UI</span></li>
        </ul>
      </div>
    </div>
  </div>
</div>
<script src="common.js"></script>
<script>
initSidebar('dashboard');
initHeader([{text: '总览'}]);

fetch('/api/payment-instructions?size=1')
  .then(r => r.json())
  .then(page => {
    document.getElementById('paymentCount').innerHTML = `${page.totalElements}<span class="stat-unit">笔</span>`;
  })
  .catch(() => {});

fetch('/api/approvals?status=PENDING&size=1')
  .then(r => r.json())
  .then(page => {
    document.getElementById('pendingApproval').innerHTML = `${page.totalElements}<span class="stat-unit">条</span>`;
  })
  .catch(() => {});

fetch('/api/payment-instructions?status=VALIDATING_FAILED,CITIFT_PENDING_TIMEOUT,LCP_PENDING_TIMEOUT,CIPS_PENDING_TIMEOUT,SEND_FAILED&size=1')
  .then(r => r.json())
  .then(page => {
    document.getElementById('exceptionCount').innerHTML = `${page.totalElements}<span class="stat-unit">条</span>`;
  })
  .catch(() => {});
</script>
</body>
</html>
