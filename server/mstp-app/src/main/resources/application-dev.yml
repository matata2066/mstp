spring:
  datasource:
    url: jdbc:h2:file:./data/mstp;MODE=Oracle
    username: sa
    password:
    driver-class-name: org.h2.Driver

  h2:
    console:
      enabled: true
      path: /h2-console

  sql:
    init:
      mode: never
      schema-locations: classpath:schema-h2.sql
      data-locations: classpath:data-h2.sql
      encoding: UTF-8

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: none
    show-sql: true

  flyway:
    enabled: false

logging:
  level:
    com.mstp: DEBUG
    org.hibernate.SQL: DEBUG
