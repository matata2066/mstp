version: '3.8'

services:
  oracle-xe:
    image: gvenzl/oracle-xe:21-slim
    container_name: mstp-oracle
    ports:
      - "1521:1521"
    environment:
      ORACLE_PASSWORD: mstp
      APP_USER: mstp
      APP_USER_PASSWORD: mstp
    volumes:
      - oracle-data:/opt/oracle/oradata
    healthcheck:
      test: ["CMD", "healthcheck.sh"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s

volumes:
  oracle-data:
